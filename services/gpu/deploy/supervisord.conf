[program:nginx]
command=nginx -c %(ENV_GPU_DIR)s/deploy/nginx.conf
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
; Start the gateway after the workers have had a moment to bind.
priority=50
