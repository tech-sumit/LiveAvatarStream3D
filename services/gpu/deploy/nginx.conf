# LiveAvatarStream GPU gateway.
#
# One H100 pod runs six uvicorn apps (avatar-build on 127.0.0.1:8011, the other
# five on 8002-8006) plus engine-three (Node on 127.0.0.1:8090); this nginx
# exposes a single port (8080) and routes /{service}/... to the right upstream while stripping the /{service}/ prefix
# (trailing slash on proxy_pass) so each app sees its own routes
# (/health, /render, /tts, ...). avatar-build sits on 8011 (not 8001) to avoid a
# port clash on the pod — see deploy/POD_SETUP.md §5.
#
# Matches services/control-api HttpGpuProvider: it calls
#   {GPU_PROVIDER_BASE_URL}/{service}{path}
# e.g. {base}/avatar-video/render  ->  127.0.0.1:8004/render
#      {base}/avatar-build/health  ->  127.0.0.1:8011/health (GET)

daemon off;
worker_processes 4;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Renders run for minutes; never time out the upstream mid-job.
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    send_timeout 3600s;

    # Reference videos / audio can be large; don't cap request bodies.
    client_max_body_size 0;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket upgrade passthrough (realtime control channel).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;

    map $http_upgrade $http_connection {
        default upgrade;
        ''      close;
    }

    upstream avatar_build { server 127.0.0.1:8011; }
    upstream image_gen    { server 127.0.0.1:8002; }
    upstream voice        { server 127.0.0.1:8003; }
    upstream avatar_video { server 127.0.0.1:8004; }
    upstream finishing    { server 127.0.0.1:8005; }
    upstream realtime     { server 127.0.0.1:8006; }
    upstream engine_three { server 127.0.0.1:8090; }

    server {
        listen 8080;
        server_name _;

        location = / {
            return 200 "las-gpu-gateway ok\n";
            add_header Content-Type text/plain;
        }

        location /avatar-build/ { proxy_pass http://avatar_build/; }
        location /image-gen/    { proxy_pass http://image_gen/; }
        location /voice/        { proxy_pass http://voice/; }
        location /avatar-video/ { proxy_pass http://avatar_video/; }
        location /finishing/    { proxy_pass http://finishing/; }
        location /realtime/     { proxy_pass http://realtime/; }
        location /engine-three/ { proxy_pass http://engine_three/; }
    }
}
