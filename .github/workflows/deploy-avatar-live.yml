name: Deploy avatar-live

# CI/CD: build the realtime avatar studio and publish it to Cloudflare Pages
# (project: las-avatar-live → https://las-avatar-live.pages.dev).
# Runs on every push to main that touches the app or its protocol dep, and on demand.
#
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# NOTE: this deploys the STATIC build. The cloud-voice (ElevenLabs) + R2 paths use the
# Vite dev server's server-side proxy and are intentionally NOT exposed on the public
# URL; the public demo runs on the local Web-Speech TTS + localStorage fallback.

on:
  push:
    branches: [main]
    paths:
      - 'apps/avatar-live/**'
      - 'packages/protocol/**'
      - '.github/workflows/deploy-avatar-live.yml'
  workflow_dispatch:

concurrency:
  group: deploy-avatar-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build protocol (avatar-live consumes its dist)
        run: npm run build --workspace @las/protocol

      - name: Build avatar-live
        run: npm run build --workspace @las/avatar-live

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/avatar-live/dist --project-name=las-avatar-live --branch=main
